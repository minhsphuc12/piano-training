name: PianoTrainer
options:
  bundleIdPrefix: com.pianotrainer
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PianoTrainer:
    type: application
    platform: iOS
    sources:
      - path: PianoTrainer
        excludes:
          - "**/*.md"
    resources:
      - path: PianoTrainer/Resources/SampleSongs.json
    info:
      path: PianoTrainer/Info.plist
      properties:
        CFBundleDisplayName: Piano Trainer
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Used to detect notes when practicing with a real instrument"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pianotrainer.app
        INFOPLIST_FILE: PianoTrainer/Info.plist

  PianoTrainerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PianoTrainerTests
    dependencies:
      - target: PianoTrainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pianotrainer.tests
